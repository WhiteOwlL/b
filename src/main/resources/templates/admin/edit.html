<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit User</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card">
        <div class="card-header">
          <h5>Edit user</h5>
        </div>
        <div class="card-body">
          <form th:action="@{/admin/edit}" method="post">
            <input type="hidden" name="id" th:value="${user.id}" />

            <div class="mb-3">
              <label class="form-label">ID</label>
              <input type="text" class="form-control" th:value="${user.id}" readonly>
            </div>
            <div class="mb-3">
              <label class="form-label">First name</label>
              <input type="text" name="firstName" class="form-control" th:value="${user.firstName}">
            </div>
            <div class="mb-3">
              <label class="form-label">Last name</label>
              <input type="text" name="lastName" class="form-control" th:value="${user.lastName}">
            </div>
            <div class="mb-3">
              <label class="form-label">Age</label>
              <input type="number" name="age" class="form-control" th:value="${user.age}">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="text" name="username" class="form-control" th:value="${user.username}">
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control">
            </div>
            <div class="mb-4">
              <label class="form-label">Role</label>
              <select name="roleList" class="form-select" multiple>
                <option value="ROLE_ADMIN" th:selected="${user.roles.?[name == 'ROLE_ADMIN'].size() > 0}">ADMIN</option>
                <option value="ROLE_USER" th:selected="${user.roles.?[name == 'ROLE_USER'].size() > 0}">USER</option>
              </select>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <a th:href="@{/admin/}" class="btn btn-secondary me-md-2">Close</a>
              <button type="submit" class="btn btn-primary">Edit</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
